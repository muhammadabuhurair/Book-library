<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
  </head>
  <body style="background-color: #f4f6f9">
    <a href="index.html">
      <button
        style="
          background: #1e3a5f;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Back to Home
      </button>
    </a>
    <h1 style="color: #1e3a5f; text-align: center">Contact Us</h1>
    <p style="text-align: center; color: #666">
      We'd love to hear from you. Send us a message!
    </p>
    <div style="display: flex; justify-content: center">
      <form
        action=""
        method="post"
        style="
          width: 50%;
          background-color: #ffffff;
          padding: 20px;
          border: 2px solid #b8520a;
          border-radius: 8px;
        "
      >
        <label for="name" style="font-family: Arial; color: #666">Name:</label
        ><br />
        <input
          type="text"
          id="name"
          name="name"
          required
          placeholder="Type Last Name"
          style="width: 100%; padding: 8px; margin-bottom: 12px"
        /><br />
        <label for="email" style="font-family: Arial; color: #666">Email:</label
        ><br />
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="Type Email"
          style="width: 100%; padding: 8px; margin-bottom: 12px"
        /><br />
        <label for="message" style="font-family: Arial; color: #666"
          >Message:</label
        ><br />
        <textarea
          id="message"
          name="message"
          rows="4"
          required
          placeholder="Type your message here..."
          style="width: 100%; padding: 8px; margin-bottom: 12px"
        ></textarea
        ><br />
        <input
          type="submit"
          value="Send Message"
          style="
            background: #1e3a5f;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        />
      </form>
    </div>
    <div style="text-align: center; margin-top: 20px">
      <p>
        📧 Email:
        <a href="mailto:abuhurairakhan799@gmail.com"
          >abuhurairakhan799@gmail.com</a
        >
      </p>
      <p>📞 Phone: +92 300 1234567</p>
    </div>
  </body>
</html>
